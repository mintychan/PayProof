specVersion: 1.0.0
description: PayProof payroll streams indexed for analytics and dashboards.
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: EncryptedPayroll
    network: sepolia
    source:
      address: "0x6fa3a1adC06fefeA333A1ce82B4e36Fac539ed9D"
      abi: EncryptedPayroll
      startBlock: 7000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/mapping.ts
      entities:
        - Stream
        - StreamEvent
      abis:
        - name: EncryptedPayroll
          file: ./abis/EncryptedPayroll.json
      eventHandlers:
        - event: StreamCreated(indexed bytes32,indexed uint256,indexed address,address,bytes32,uint32,uint64)
          handler: handleStreamCreated
        - event: StreamPaused(indexed bytes32)
          handler: handleStreamPaused
        - event: StreamResumed(indexed bytes32)
          handler: handleStreamResumed
        - event: StreamCancelled(indexed bytes32)
          handler: handleStreamCancelled
        - event: StreamSettled(indexed bytes32)
          handler: handleStreamSettled
        - event: StreamConfigured(indexed bytes32,bool,bool)
          handler: handleStreamConfigured
        - event: StreamHookUpdated(indexed bytes32,indexed address,indexed address)
          handler: handleStreamHookUpdated
        - event: StreamToppedUp(indexed bytes32,bytes32)
          handler: handleStreamToppedUp
        - event: StreamWithdrawn(indexed bytes32,indexed uint256,indexed address,address,bytes32)
          handler: handleStreamWithdrawn

  - kind: ethereum/contract
    name: ConfidentialVestingVault
    network: sepolia
    source:
      address: "0xDc64a140Aa3E981100a9becA4E685f962f0cF6C9"
      abi: ConfidentialVestingVault
      startBlock: 7000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/vesting.ts
      entities:
        - Vesting
        - VestingEvent
      abis:
        - name: ConfidentialVestingVault
          file: ./abis/ConfidentialVestingVault.json
      eventHandlers:
        - event: VestingCreated(indexed uint256,indexed address,indexed address,uint64,uint64,uint64,uint16,bool,bytes32)
          handler: handleVestingCreated
        - event: VestingWithdrawn(indexed uint256,indexed address,bytes32)
          handler: handleVestingWithdrawn
        - event: VestingCancelled(indexed uint256,indexed address,bytes32)
          handler: handleVestingCancelled
        - event: VestingRevoked(indexed uint256,indexed address)
          handler: handleVestingRevoked

  - kind: ethereum/contract
    name: IncomeOracle
    network: sepolia
    source:
      address: "0xFe74a9453f216433A2ad70e06a9D241B29077BB8"
      abi: IncomeOracle
      startBlock: 7000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      file: ./src/oracle.ts
      entities:
        - Attestation
        - PaymentRecord
      abis:
        - name: IncomeOracle
          file: ./abis/IncomeOracle.json
      eventHandlers:
        - event: PaidAmountUpdated(indexed bytes32,indexed uint256,bytes32)
          handler: handlePaidAmountUpdated
        - event: OutstandingRecorded(indexed bytes32,indexed uint256,bytes32)
          handler: handleOutstandingRecorded
        - event: Attested(indexed address,indexed bytes32,uint256,bytes32,bytes32,bytes32)
          handler: handleAttested
